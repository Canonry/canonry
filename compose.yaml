services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aeo_platform}
      POSTGRES_USER: ${POSTGRES_USER:-aeo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aeo}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aeo} -d ${POSTGRES_DB:-aeo_platform}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile --config.confirmModulesPurge=false && pnpm --filter @ainyc/aeo-platform-api run dev"
    volumes:
      - .:/workspace
      - api-node-modules:/workspace/node_modules
    environment:
      CI: "true"
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: ${API_PORT:-3000}
      BOOTSTRAP_SECRET: ${BOOTSTRAP_SECRET}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile --config.confirmModulesPurge=false && pnpm --filter @ainyc/aeo-platform-worker run dev"
    volumes:
      - .:/workspace
      - worker-node-modules:/workspace/node_modules
    environment:
      CI: "true"
      DATABASE_URL: ${DATABASE_URL}
      WORKER_PORT: ${WORKER_PORT:-3001}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MAX_CONCURRENCY: ${GEMINI_MAX_CONCURRENCY:-2}
      GEMINI_MAX_REQUESTS_PER_MINUTE: ${GEMINI_MAX_REQUESTS_PER_MINUTE:-10}
      GEMINI_MAX_REQUESTS_PER_DAY: ${GEMINI_MAX_REQUESTS_PER_DAY:-1000}
    ports:
      - "${WORKER_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile --config.confirmModulesPurge=false && pnpm --filter @ainyc/aeo-platform-web run dev"
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/node_modules
    environment:
      CI: "true"
      API_INTERNAL_BASE_URL: http://api:3000
      WORKER_INTERNAL_BASE_URL: http://worker:3001
    ports:
      - "${WEB_PORT:-4173}:4173"
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy

volumes:
  postgres-data:
  api-node-modules:
  worker-node-modules:
  web-node-modules:
