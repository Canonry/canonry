<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <!-- Glow for the canary -->
    <radialGradient id="canaryGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#D93F45" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D93F45" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Subtle top border accent -->
  <rect width="1280" height="2" fill="#D93F45" opacity="0.6"/>

  <!-- Canary glow -->
  <circle cx="280" cy="320" r="200" fill="url(#canaryGlow)"/>

  <!-- Canary mascot (scaled from favicon, centered at 280, 300) -->
  <g transform="translate(280, 300) scale(3.2)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Offset to center the bird which is drawn around cx=32 -->
    <g transform="translate(-32, -34)">
      <!-- Crest feathers -->
      <g fill="#D93F45" stroke="#8A171E" stroke-width="2.6">
        <circle cx="25" cy="16" r="5.5"/>
        <circle cx="32" cy="12.5" r="6"/>
        <circle cx="39" cy="16" r="5.5"/>
        <!-- Wings -->
        <ellipse cx="21.5" cy="34" rx="6.5" ry="10.5" transform="rotate(-18 21.5 34)" fill="#B82931"/>
        <ellipse cx="42.5" cy="34" rx="6.5" ry="10.5" transform="rotate(18 42.5 34)" fill="#B82931"/>
        <!-- Body -->
        <ellipse cx="32" cy="34" rx="16.5" ry="18.5"/>
      </g>
      <!-- Belly highlights -->
      <ellipse cx="27.5" cy="26.5" rx="4.6" ry="6.2" fill="#FFB0AE" opacity=".2"/>
      <ellipse cx="32" cy="39.5" rx="11.5" ry="12.5" fill="#FF8E8B" opacity=".24"/>
      <!-- Cheeks -->
      <circle cx="23.2" cy="35.5" r="2" fill="#FFB8B2" opacity=".7"/>
      <circle cx="40.8" cy="35.5" r="2" fill="#FFB8B2" opacity=".7"/>
      <!-- Beak -->
      <path d="M32 30.5 27.8 33.9 32 37.1 36.2 33.9Z" fill="#F39A31" stroke="#8A171E" stroke-width="2"/>
      <!-- Eyes -->
      <circle cx="27.2" cy="28.6" r="2.8" fill="#2C2412"/>
      <circle cx="36.8" cy="28.6" r="2.8" fill="#2C2412"/>
      <!-- Eye highlights -->
      <circle cx="26.4" cy="27.7" r="0.9" fill="#FFF8E2"/>
      <circle cx="36" cy="27.7" r="0.9" fill="#FFF8E2"/>
      <!-- Feet -->
      <path d="M26 53.5v3.5m0 0-2 2m2-2 2 2m10-5.5v3.5m0 0-2 2m2-2 2 2" stroke="#DB8B2B" stroke-width="2.4"/>
    </g>
  </g>

  <!-- Text content -->
  <g>
    <!-- Project name -->
    <text x="500" y="214" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#fafafa" letter-spacing="-2">canonry</text>

    <!-- Positioning -->
    <text x="500" y="274" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#e4e4e7" letter-spacing="-0.5">Agent-first AEO operating platform</text>
    <text x="500" y="318" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="21" font-weight="400" fill="#a1a1aa">Track citation + mention coverage across answer engines,</text>
    <text x="500" y="349" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="21" font-weight="400" fill="#a1a1aa">diagnose regressions, and act with Aero.</text>

    <!-- Platform surface pills -->
    <g transform="translate(500, 392)">
      <rect x="0" y="0" width="132" height="36" rx="18" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
      <circle cx="21" cy="18" r="4" fill="#34d399" opacity="0.85"/>
      <text x="76" y="23" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#d4d4d8" text-anchor="middle">Open source</text>

      <rect x="146" y="0" width="130" height="36" rx="18" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
      <circle cx="167" cy="18" r="4" fill="#fbbf24" opacity="0.85"/>
      <text x="221" y="23" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#d4d4d8" text-anchor="middle">Self-hosted</text>

      <rect x="290" y="0" width="146" height="36" rx="18" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
      <circle cx="311" cy="18" r="4" fill="#60a5fa" opacity="0.85"/>
      <text x="365" y="23" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#d4d4d8" text-anchor="middle">CLI / API / MCP</text>
    </g>

    <!-- Operating loop -->
    <g transform="translate(500, 450)">
      <rect x="0" y="0" width="438" height="74" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1.5"/>
      <text x="22" y="28" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="13" fill="#71717a">signals</text>
      <text x="130" y="28" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="13" fill="#71717a">analysis</text>
      <text x="250" y="28" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="13" fill="#71717a">actions</text>
      <path d="M88 24H116" stroke="#52525b" stroke-width="1.5"/>
      <path d="M112 20L118 24L112 28" fill="none" stroke="#52525b" stroke-width="1.5"/>
      <path d="M202 24H234" stroke="#52525b" stroke-width="1.5"/>
      <path d="M230 20L236 24L230 28" fill="none" stroke="#52525b" stroke-width="1.5"/>
      <rect x="22" y="42" width="76" height="12" rx="6" fill="#34d399" opacity="0.82"/>
      <rect x="130" y="42" width="94" height="12" rx="6" fill="#fbbf24" opacity="0.82"/>
      <rect x="250" y="42" width="132" height="12" rx="6" fill="#60a5fa" opacity="0.82"/>
    </g>

    <!-- CLI command hint -->
    <g transform="translate(500, 544)">
      <rect x="0" y="0" width="340" height="40" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1.5"/>
      <text x="16" y="26" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="15" fill="#71717a">$</text>
      <text x="32" y="26" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="15" fill="#d4d4d8">cnry run my-site --wait</text>
    </g>
  </g>

  <!-- Bottom border accent -->
  <rect y="638" width="1280" height="2" fill="#D93F45" opacity="0.3"/>
</svg>
