name: CI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/actions/setup/action.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'docker/**'
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'eslint.config.js'
      - 'scripts/**'
      - 'skills/**'
      - 'plugins/**'
      - '.agents/**'
      - '.claude-plugin/**'
      - 'AGENTS.md'
  pull_request:
    # No `branches:` filter — run CI on every PR, including stacked PRs
    # targeting feature branches. This keeps each step of a stack green
    # without waiting until rebase-to-main.
    paths:
      - '.github/workflows/ci.yml'
      - '.github/actions/setup/action.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'docker/**'
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'eslint.config.js'
      - 'scripts/**'
      - 'skills/**'
      - 'plugins/**'
      - '.agents/**'
      - '.claude-plugin/**'
      - 'AGENTS.md'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Restore TypeScript incremental cache
        uses: actions/cache@v4
        with:
          path: '**/*.tsbuildinfo'
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.run_id }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            tsbuildinfo-${{ runner.os }}-
      - run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run test

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bash scripts/check-docs.sh
        name: Check documentation coverage (AGENTS.md per package)
      - run: pnpm run lint

  codegen-drift:
    # Regenerates the hey-api client from the OpenAPI spec and fails if the
    # committed output differs. Run separately from `lint` so a stale client
    # surfaces as its own check name and a contributor knows to run
    # `pnpm --filter @ainyc/canonry-api-client gen` locally.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm --filter @ainyc/canonry-api-client gen:check
        name: Verify generated API client matches OpenAPI spec

  plugin-drift:
    # The native plugin mirrors the canonical Canonry/Aero skills and package
    # version. Fail with a focused check when a generated copy is stale or a
    # plugin-affecting change reuses the version already present on the base.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # The version-advancement gate resolves the PR/push merge base.
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Verify native plugin assets are in sync
        shell: bash
        env:
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          BASE_REF="$EVENT_BASE_SHA"
          if [ -z "$BASE_REF" ] || [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
            BASE_REF=$(git rev-parse HEAD^)
          fi
          if ! git cat-file -e "$BASE_REF^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$BASE_REF"
          fi
          pnpm plugin:check --base-ref "$BASE_REF"

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r run build
        name: Build all packages (catches missing deps, bundler errors)

  publish-smoke-test:
    # Catches the failure mode where a workspace dep leaks into runtime
    # `dependencies` (pnpm publish rewrites `workspace:*` → `0.0.0`,
    # which 404s on `npm install` because private workspace packages
    # aren't published). Packs canonry the same way the publish workflow
    # does and runs `npm install` against the tarball from a scratch
    # directory — exactly what external users do when they `npm i -g`.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm --filter @canonry/canonry build
        name: Build canonry (required for pnpm pack)
      - name: Pack canonry tarball
        id: pack
        shell: bash
        run: |
          cd packages/canonry
          OUTPUT=$(pnpm pack --pack-destination /tmp)
          TARBALL=$(echo "$OUTPUT" | grep -E '\.tgz$' | tail -1)
          if [ -z "$TARBALL" ] || [ ! -f "$TARBALL" ]; then
            echo "pnpm pack did not produce a tarball" >&2
            echo "$OUTPUT" >&2
            exit 1
          fi
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
      - name: Install canonry from tarball into scratch project
        shell: bash
        run: |
          SCRATCH=$(mktemp -d)
          cd "$SCRATCH"
          npm init -y > /dev/null
          npm install "${{ steps.pack.outputs.tarball }}"
          ./node_modules/.bin/canonry --version

  validate:
    runs-on: ubuntu-latest
    needs: [typecheck, test, lint, codegen-drift, plugin-drift, build, publish-smoke-test]
    if: always()
    steps:
      - name: Verify all validate jobs succeeded
        run: |
          if [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.codegen-drift.result }}" != "success" ] || \
             [ "${{ needs.plugin-drift.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.publish-smoke-test.result }}" != "success" ]; then
            echo "One or more validate jobs failed"
            exit 1
          fi
          echo "All validate jobs passed"

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Use the runner's bundled buildx/docker driver so CI doesn't have to pull
      # an extra BuildKit image from Docker Hub before the actual image build.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: canonry:ci

      - name: Smoke test container
        shell: bash
        run: |
          docker run -d --rm --name canonry-ci -p 4100:4100 -e CANONRY_API_KEY=test canonry:ci

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4100/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs canonry-ci
          exit 1

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f canonry-ci || true
